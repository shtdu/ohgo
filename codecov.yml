# Codecov configuration for ohgo
# Reference: https://docs.codecov.com/docs/codecov-yaml
# Validation: curl -X POST --data-binary @codecov.yml https://api.codecov.io/validate

coverage:
  precision: 2
  round: down
  status:
    project:
      default:
        target: 60%
        threshold: 5%
        if_ci_failed: error
    patch:
      default:
        target: 50%
        threshold: 5%

comment:
  layout: "header, diff, flags, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

flags:
  go:
    paths:
      - .

flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: 60%
      - type: patch
        target: 50%

ignore:
  - "**/*_test.go"
  - "**/testutil/**"
  - "**/scripts/**"
  - "OpenHarness/**"
  - "cmd/**"

github_checks:
  annotations: true
